name = "wayfair-inspection"
main = "src/index.ts"
compatibility_date = "2025-10-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSIONS"
id = "d056883efd9743c9ad523ab6f275fc07"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "wayfair-inspection-photos"

[vars]
MOCK_VISION = ""
# Set via .dev.vars (local) or `wrangler secret put` (prod):
#   BASETEN_LLM_ENDPOINT_URL   (e.g. https://model-XXXX.api.baseten.co/environments/production/sync/v1)
#   BASETEN_LLM_API_KEY
#   BASETEN_VISION_ENDPOINT_URL
#   BASETEN_VISION_API_KEY
